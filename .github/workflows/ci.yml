name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]" -r infrastructure/requirements.txt
      - run: ruff check shared services tests infrastructure
      - run: pytest
      - run: npm install --global aws-cdk@2.1132.0
      - run: cd infrastructure && cdk synth --strict
      - name: Dependency vulnerability scan
        run: pip install pip-audit && pip-audit
