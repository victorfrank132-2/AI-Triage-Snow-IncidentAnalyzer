version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 20
    commands:
      - python -m pip install --upgrade pip
      - pip install -e ".[dev]" -r infrastructure/requirements.txt
      - npm install --global aws-cdk@2.1132.0
  build:
    commands:
      - ruff check shared services tests
      - pytest
      - cd infrastructure && cdk synth --strict
artifacts:
  files:
    - "**/*"
